services:
  - type: web
    name: fco-hub-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ENABLE_BACKGROUND_SYNC
        value: "false"
      - key: CLIENT_URL
        sync: false
      - key: MONGODB_URI
        sync: false
